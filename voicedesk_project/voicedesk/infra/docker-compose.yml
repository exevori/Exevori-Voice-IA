version: "3.9"

# ============================================================
# VOICEDESK IA — Docker Compose (monorepo)
# Usage :
#   docker-compose -f infra/docker-compose.yml up -d
# ============================================================

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: voicedesk-backend
    restart: unless-stopped
    ports: ["3000:3000"]
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on: [gateway]
    networks: [voicedesk]

  gateway:
    build:
      context: ../backend/gateway
      dockerfile: ../../infra/Dockerfile.service
    container_name: voicedesk-gateway
    restart: unless-stopped
    ports: ["3100:3100"]
    env_file: ../.env
    command: node index.js
    networks: [voicedesk]

  voice-inbound:
    build:
      context: ../backend/voice
      dockerfile: ../../infra/Dockerfile.service
    container_name: voicedesk-voice-inbound
    restart: unless-stopped
    ports: ["8080:8080"]
    env_file: ../.env
    command: node inbound.js
    depends_on: [gateway]
    networks: [voicedesk]

  voice-outbound:
    build:
      context: ../backend/voice
      dockerfile: ../../infra/Dockerfile.service
    container_name: voicedesk-voice-outbound
    restart: unless-stopped
    ports: ["8081:8081"]
    env_file: ../.env
    command: node outbound.js
    depends_on: [gateway]
    networks: [voicedesk]

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    container_name: voicedesk-frontend
    restart: unless-stopped
    ports: ["5173:80"]
    networks: [voicedesk]

networks:
  voicedesk:
    driver: bridge
